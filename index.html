<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Outreach Log</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --border-color: #e4e4e7;
            --border-focus: #18181b;
            --text-main: #09090b;
            --text-muted: #71717a;
            --primary: #18181b;
            --primary-hover: #27272a;
            
            --status-to-contact: #fef3c7;
            --status-to-contact-text: #d97706;
            --status-contacted: #dbeafe;
            --status-contacted-text: #2563eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background-color: var(--bg-color); color: var(--text-main); -webkit-font-smoothing: antialiased; }
        body { font-family: "Neue Haas Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif; display: flex; flex-direction: column; padding: 24px; overflow: hidden; }
        
        .container { width: 100%; max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; height: 100%; }
        header { margin-bottom: 16px; flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 24px; font-weight: 700; color: var(--text-main); letter-spacing: -0.03em; }
        
        .sync-status { font-size: 12px; font-weight: 500; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .sync-dot { width: 8px; height: 8px; background-color: #22c55e; border-radius: 50%; }
        .sync-dot.syncing { background-color: #eab308; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .form-panel { flex: 0 0 auto; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02); }
        .form-panel h2 { font-size: 11px; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
        .form-grid { display: grid; grid-template-columns: repeat(5, minmax(140px, 1fr)) auto; gap: 12px; align-items: flex-end; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 11px; font-weight: 600; color: var(--text-main); letter-spacing: -0.01em; }
        .form-group input, .form-group select { height: 36px; padding: 0 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; outline: none; background-color: #fff; color: var(--text-main); font-family: inherit; transition: all 0.15s ease-in-out; }
        .form-group input:focus, .form-group select:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(24, 24, 27, 0.05); }
        
        .btn-submit { height: 36px; padding: 0 24px; background-color: var(--primary); color: white; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background-color 0.15s ease-in-out; white-space: nowrap; }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { background-color: var(--text-muted); cursor: not-allowed; }

        .controls-bar { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 16px; }
        .search-container { flex: 1; max-width: 400px; }
        .search-container input { width: 100%; height: 36px; padding: 0 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; outline: none; background-color: var(--card-bg); color: var(--text-main); font-family: inherit; transition: all 0.15s ease-in-out; }
        .search-container input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 2px rgba(24, 24, 27, 0.05); }
        .filters-container { display: flex; gap: 12px; }
        .filters-container select { height: 36px; padding: 0 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 13px; outline: none; background-color: var(--card-bg); color: var(--text-main); font-family: inherit; cursor: pointer; }

        .table-container { flex: 1 1 auto; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; overflow-y: auto; overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01), 0 2px 4px -2px rgba(0, 0, 0, 0.01); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        thead { position: sticky; top: 0; z-index: 10; }
        th { background-color: #fcfcfc; color: var(--text-muted); font-weight: 600; padding: 12px 16px; border-bottom: 1px solid var(--border-color); text-transform: uppercase; font-size: 10px; letter-spacing: 0.05em; }
        td { padding: 10px 16px; border-bottom: 1px solid var(--border-color); vertical-align: middle; color: var(--text-main); }
        tr:last-child td { border-bottom: none; }
        tr:hover { background-color: #fafafa; }
        
        .profile-link { color: #2563eb; text-decoration: none; word-break: break-all; font-weight: 500; }
        .profile-link:hover { text-decoration: underline; }
        .cell-input { width: 100%; height: 30px; padding: 0 8px; border: 1px solid transparent; background-color: transparent; border-radius: 4px; font-size: 13px; font-family: inherit; color: var(--text-main); transition: all 0.1s ease; }
        .cell-input:hover { border-color: var(--border-color); background-color: #fff; }
        .cell-input:focus { border-color: var(--border-focus); background-color: #fff; outline: none; }
        .cell-select { width: 100%; height: 30px; padding: 0 4px; border: 1px solid transparent; background-color: transparent; border-radius: 4px; font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text-main); transition: all 0.1s ease; }
        .cell-select:hover { border-color: var(--border-color); background-color: #fff; }
        .cell-select:focus { border-color: var(--border-focus); outline: none; }
        
        .status-badge { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; text-align: center; appearance: none; -webkit-appearance: none; border: 1px solid transparent; }
        .status-to-contact { background-color: var(--status-to-contact); color: var(--status-to-contact-text); }
        .status-contacted { background-color: var(--status-contacted); color: var(--status-contacted-text); }
        .sno-col { color: var(--text-muted); font-weight: 500; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Influencer Outreach Log</h1>
        <div class="sync-status" id="syncStatus">
            <div class="sync-dot" id="syncDot"></div>
            <span id="syncText">System Ready</span>
        </div>
    </header>

    <div class="form-panel">
        <h2>Add Profile</h2>
        <form id="influencerForm" class="form-grid">
            <div class="form-group">
                <label for="infName">Influencer Name</label>
                <input type="text" id="infName" placeholder="Username or name" required>
            </div>
            <div class="form-group">
                <label for="infLink">Profile Link</label>
                <input type="url" id="infLink" placeholder="https://instagram.com/...">
            </div>
            <div class="form-group">
                <label for="sourcerName">Sourcer Name</label>
                <input type="text" id="sourcerName" placeholder="PR Rep Name" required>
            </div>
            <div class="form-group">
                <label for="infContact">Contact Info</label>
                <input type="text" id="infContact" placeholder="Phone or email">
            </div>
            <div class="form-group">
                <label for="initialStatus">Outreach Status</label>
                <select id="initialStatus">
                    <option value="To Contact">To Contact</option>
                    <option value="Contacted">Contacted</option>
                </select>
            </div>
            <button type="submit" id="submitBtn" class="btn-submit">Add Profile</button>
        </form>
    </div>

    <div class="controls-bar">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search influencers, sourcers, or contacts...">
        </div>
        <div class="filters-container">
            <select id="filterStatus">
                <option value="All">All Statuses</option>
                <option value="To Contact">To Contact</option>
                <option value="Contacted">Contacted</option>
            </select>
            <select id="filterOutcome">
                <option value="All">All Outcomes</option>
                <option value="Pending">Pending</option>
                <option value="Accepted">Accepted</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 5%;">S.No.</th>
                    <th style="width: 15%;">Influencer Name</th>
                    <th style="width: 22%;">Profile Link</th>
                    <th style="width: 12%;">Sourcer</th>
                    <th style="width: 12%;">Outreach Status</th>
                    <th style="width: 11%;">Date</th>
                    <th style="width: 12%;">Contact Info</th>
                    <th style="width: 11%;">Follow-Up Outcome</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="8" class="empty-state">Loading database from cloud...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- IMPORTANT: PASTE YOUR APP SCRIPT DEPLOYMENT URL HERE ---
    const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbw5sKBsyMylxdbzl-o_aO6nDVPmr_XJBiORnbpJgmzE8C0aFHTLCAL7OIkweGuVKUYv/exec";

    let masterDataMatrix = [];
    const tableBody = document.getElementById('tableBody');
    const influencerForm = document.getElementById('influencerForm');
    const submitBtn = document.getElementById('submitBtn');
    const searchInput = document.getElementById('searchInput');
    const filterStatus = document.getElementById('filterStatus');
    const filterOutcome = document.getElementById('filterOutcome');
    const syncDot = document.getElementById('syncDot');
    const syncText = document.getElementById('syncText');

    searchInput.addEventListener('input', executeFilters);
    filterStatus.addEventListener('change', executeFilters);
    filterOutcome.addEventListener('change', executeFilters);

    function setSyncState(isSyncing) {
        if(isSyncing) {
            syncDot.classList.add('syncing');
            syncText.innerText = 'Syncing...';
            submitBtn.disabled = true;
        } else {
            syncDot.classList.remove('syncing');
            syncText.innerText = 'Synced to Cloud';
            submitBtn.disabled = false;
        }
    }

    async function loadDatabase() {
        if(GOOGLE_APP_URL === "YOUR_WEB_APP_URL_HERE") {
            tableBody.innerHTML = `<tr><td colspan="8" class="empty-state" style="color: red;">Error: Please insert your Google App URL in the code.</td></tr>`;
            return;
        }
        
        try {
            setSyncState(true);
            const response = await fetch(GOOGLE_APP_URL);
            masterDataMatrix = await response.json();
            executeFilters();
            setSyncState(false);
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="8" class="empty-state">Failed to load database. Check network connection.</td></tr>`;
            setSyncState(false);
        }
    }

    async function updateDatabaseRecord(action, data) {
        setSyncState(true);
        try {
            await fetch(GOOGLE_APP_URL, {
                method: "POST",
                body: JSON.stringify({ action: action, data: data }),
                headers: { "Content-Type": "text/plain;charset=utf-8" }
            });
            setSyncState(false);
        } catch (error) {
            console.error("Database update failed", error);
            syncText.innerText = 'Sync Failed - Retrying later';
            syncDot.style.backgroundColor = '#ef4444';
        }
    }

    function executeFilters() {
        const searchTerm = searchInput.value.toLowerCase();
        const activeStatus = filterStatus.value;
        const activeOutcome = filterOutcome.value;

        const filteredSubset = masterDataMatrix.filter(item => {
            const matchesSearch = item.name.toLowerCase().includes(searchTerm) || 
                                  item.sourcer.toLowerCase().includes(searchTerm) ||
                                  (item.contact && item.contact.toLowerCase().includes(searchTerm));
            
            const matchesStatus = activeStatus === 'All' || item.status === activeStatus;
            const matchesOutcome = activeOutcome === 'All' || item.outcome === activeOutcome;

            return matchesSearch && matchesStatus && matchesOutcome;
        });

        renderDatabaseGrid(filteredSubset);
    }

    function renderDatabaseGrid(dataToRender) {
        if (!tableBody) return;
        tableBody.innerHTML = '';
        
        if (dataToRender.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8" class="empty-state">No profiles match the current criteria.</td></tr>`;
            return;
        }
        
        const totalMasterCount = masterDataMatrix.length;
        
        dataToRender.forEach(item => {
            const rowElement = document.createElement('tr');
            const statusStyleClass = item.status === 'To Contact' ? 'status-to-contact' : 'status-contacted';
            
            const absoluteIndex = masterDataMatrix.findIndex(record => record.id === item.id);
            const computedSerialNumber = totalMasterCount - absoluteIndex;
            
            const linkCellHTML = item.link 
                ? `<a href="${escapeDataStrings(item.link)}" target="_blank" class="profile-link">${escapeDataStrings(item.link)}</a>`
                : `<span style="color: var(--text-muted);">-</span>`;

            rowElement.innerHTML = `
                <td class="sno-col">${computedSerialNumber}</td>
                <td><strong>${escapeDataStrings(item.name)}</strong></td>
                <td>${linkCellHTML}</td>
                <td>${escapeDataStrings(item.sourcer)}</td>
                <td>
                    <select class="cell-select status-badge ${statusStyleClass}" onchange="modifyRowField('${item.id}', 'status', this.value)">
                        <option value="To Contact" ${item.status === 'To Contact' ? 'selected' : ''}>To Contact</option>
                        <option value="Contacted" ${item.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
                    </select>
                </td>
                <td>
                    <input type="date" class="cell-input" value="${item.date || ''}" onchange="modifyRowField('${item.id}', 'date', this.value)">
                </td>
                <td>
                    <input type="text" class="cell-input" value="${escapeDataStrings(item.contact)}" placeholder="Add details..." onchange="modifyRowField('${item.id}', 'contact', this.value)">
                </td>
                <td>
                    <select class="cell-select" onchange="modifyRowField('${item.id}', 'outcome', this.value)">
                        <option value="Pending" ${item.outcome === 'Pending' ? 'selected' : ''}>Pending</option>
                        <option value="Accepted" ${item.outcome === 'Accepted' ? 'selected' : ''}>Accepted</option>
                        <option value="Rejected" ${item.outcome === 'Rejected' ? 'selected' : ''}>Rejected</option>
                    </select>
                </td>
            `;
            tableBody.appendChild(rowElement);
        });
    }

    function modifyRowField(id, fieldName, newValue) {
        const targetRecord = masterDataMatrix.find(record => String(record.id) === String(id));
        if (targetRecord) {
            targetRecord[fieldName] = newValue;
            executeFilters(); // Update UI immediately (Optimistic rendering)
            updateDatabaseRecord("update", targetRecord); // Push to cloud in background
        }
    }

    if (influencerForm) {
        influencerForm.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const localTimestamp = new Date();
            const offsetDate = new Date(localTimestamp.getTime() - (localTimestamp.getTimezoneOffset() * 60000));
            const formattedCurrentDate = offsetDate.toISOString().split('T')[0];
            
            const generatedRecord = {
                id: Date.now().toString(), 
                name: document.getElementById('infName').value,
                link: document.getElementById('infLink').value,
                sourcer: document.getElementById('sourcerName').value,
                contact: document.getElementById('infContact').value,
                status: document.getElementById('initialStatus').value,
                date: formattedCurrentDate,
                outcome: "Pending"
            };

            masterDataMatrix.unshift(generatedRecord); 
            
            filterStatus.value = 'All';
            filterOutcome.value = 'All';
            searchInput.value = '';
            
            executeFilters();
            
            document.getElementById('infName').value = '';
            document.getElementById('infLink').value = '';
            document.getElementById('infContact').value = '';

            updateDatabaseRecord("add", generatedRecord);
        });
    }

    function escapeDataStrings(rawString) {
        if (!rawString) return "";
        return String(rawString).replace(/&/g, "&amp;")
                                .replace(/</g, "&lt;")
                                .replace(/>/g, "&gt;")
                                .replace(/"/g, "&quot;")
                                .replace(/'/g, "&#039;");
    }

    // Initialize application by grabbing data from Google
    loadDatabase();
</script>

</body>
</html>
