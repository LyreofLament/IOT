<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Influencer Outreach Log</title>
    <style>
        :root {
            --bg-color: #fafafa;
            --card-bg: #ffffff;
            --border-color: #e4e4e7;
            --border-focus: #18181b;
            --text-main: #09090b;
            --text-muted: #71717a;
            --primary: #18181b;
            --primary-hover: #27272a;
            
            --status-to-contact: #fef3c7;
            --status-to-contact-text: #d97706;
            --status-contacted: #dbeafe;
            --status-contacted-text: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: "Neue Haas Grotesk", "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        header {
            margin-bottom: 16px;
            flex: 0 0 auto;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.03em;
        }

        /* 30% Top Layout Section */
        .form-panel {
            flex: 0 0 25%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-panel h2 {
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        /* Hyper-Horizontal Row Workspace */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(140px, 1fr)) auto;
            gap: 12px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.01em;
        }

        .form-group input, .form-group select {
            height: 36px;
            padding: 0 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            outline: none;
            background-color: #fff;
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.15s ease-in-out;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(24, 24, 27, 0.05);
        }

        .btn-submit {
            height: 36px;
            padding: 0 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background-color 0.15s ease-in-out;
            white-space: nowrap;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        /* 70% Bottom Spreadsheet Frame */
        .table-container {
            flex: 1 1 70%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow-y: auto;
            overflow-x: auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01), 0 2px 4px -2px rgba(0, 0, 0, 0.01);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 13px;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
        }

        th {
            background-color: #fcfcfc;
            color: var(--text-muted);
            font-weight: 600;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.05em;
        }

        td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #fafafa;
        }

        .profile-link {
            color: #2563eb;
            text-decoration: none;
            word-break: break-all;
            font-weight: 500;
        }

        .profile-link:hover {
            text-decoration: underline;
        }

        /* Seamless Grid Inputs */
        .cell-input {
            width: 100%;
            height: 30px;
            padding: 0 8px;
            border: 1px solid transparent;
            background-color: transparent;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            color: var(--text-main);
            transition: all 0.1s ease;
        }

        .cell-input:hover {
            border-color: var(--border-color);
            background-color: #fff;
        }

        .cell-input:focus {
            border-color: var(--border-focus);
            background-color: #fff;
            outline: none;
        }

        .cell-select {
            width: 100%;
            height: 30px;
            padding: 0 4px;
            border: 1px solid transparent;
            background-color: transparent;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.1s ease;
        }

        .cell-select:hover {
            border-color: var(--border-color);
            background-color: #fff;
        }

        .cell-select:focus {
            border-color: var(--border-focus);
            outline: none;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            appearance: none;
            -webkit-appearance: none;
            border: 1px solid transparent;
        }

        .status-to-contact {
            background-color: var(--status-to-contact);
            color: var(--status-to-contact-text);
        }

        .status-contacted {
            background-color: var(--status-contacted);
            color: var(--status-contacted-text);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Influencer Outreach Log</h1>
    </header>

    <!-- Top Input Card Component -->
    <div class="form-panel">
        <h2>Add Profile</h2>
        <form id="influencerForm" class="form-grid">
            <div class="form-group">
                <label for="infName">Influencer Name</label>
                <input type="text" id="infName" placeholder="Username or name" required>
            </div>
            <div class="form-group">
                <label for="infLink">Profile Link</label>
                <input type="url" id="infLink" placeholder="[https://instagram.com/](https://instagram.com/)..." required>
            </div>
            <div class="form-group">
                <label for="sourcerName">Sourcer Name</label>
                <input type="text" id="sourcerName" placeholder="PR Rep Name" required>
            </div>
            <div class="form-group">
                <label for="infContact">Contact Info</label>
                <input type="text" id="infContact" placeholder="Phone or email">
            </div>
            <div class="form-group">
                <label for="initialStatus">Outreach Status</label>
                <select id="initialStatus">
                    <option value="To Contact">To Contact</option>
                    <option value="Contacted">Contacted</option>
                </select>
            </div>
            <button type="submit" class="btn-submit">Add Profile</button>
        </form>
    </div>

    <!-- Main Datagrid View -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 18%;">Influencer Name</th>
                    <th style="width: 22%;">Profile Link</th>
                    <th style="width: 12%;">Sourcer</th>
                    <th style="width: 13%;">Outreach Status</th>
                    <th style="width: 12%;">Date</th>
                    <th style="width: 12%;">Contact Info</th>
                    <th style="width: 11%;">Follow-Up Outcome</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Programmatic content execution stream -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const baselineMockData = [
        {
            id: 1,
            name: "Alpha Creator",
            link: "[https://instagram.com/alphacreator](https://instagram.com/alphacreator)",
            sourcer: "Sarah Jenkins",
            status: "Contacted",
            date: "2026-06-15",
            contact: "+1-555-0192",
            outcome: "Accepted"
        },
        {
            id: 2,
            name: "Zen Design Studio",
            link: "[https://instagram.com/zendesign](https://instagram.com/zendesign)",
            sourcer: "David Lee",
            status: "To Contact",
            date: "2026-06-16",
            contact: "",
            outcome: "Pending"
        }
    ];

    let masterDataMatrix = baselineMockData;
    try {
        const savedData = localStorage.getItem('prInfluencerLogs');
        if (savedData) {
            masterDataMatrix = JSON.parse(savedData);
        }
    } catch (error) {
        console.warn("Storage context rule exception managed safely.", error);
    }

    function commitStateToStorage() {
        try {
            localStorage.setItem('prInfluencerLogs', JSON.stringify(masterDataMatrix));
        } catch (error) {}
    }

    const tableBody = document.getElementById('tableBody');
    const influencerForm = document.getElementById('influencerForm');

    function renderDatabaseGrid(data) {
        if (!tableBody) return;
        tableBody.innerHTML = '';
        
        data.forEach(item => {
            const rowElement = document.createElement('tr');
            const statusStyleClass = item.status === 'To Contact' ? 'status-to-contact' : 'status-contacted';

            rowElement.innerHTML = `
                <td><strong>${escapeDataStrings(item.name)}</strong></td>
                <td><a href="${escapeDataStrings(item.link)}" target="_blank" class="profile-link">${escapeDataStrings(item.link)}</a></td>
                <td>${escapeDataStrings(item.sourcer)}</td>
                <td>
                    <select class="cell-select status-badge ${statusStyleClass}" onchange="modifyRowStatus(${item.id}, this.value)">
                        <option value="To Contact" ${item.status === 'To Contact' ? 'selected' : ''}>To Contact</option>
                        <option value="Contacted" ${item.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
                    </select>
                </td>
                <td>
                    <input type="date" class="cell-input" value="${item.date || ''}" onchange="modifyRowDate(${item.id}, this.value)">
                </td>
                <td>
                    <input type="text" class="cell-input" value="${escapeDataStrings(item.contact)}" placeholder="Add details..." oninput="modifyRowContact(${item.id}, this.value)">
                </td>
                <td>
                    <select class="cell-select" onchange="modifyRowOutcome(${item.id}, this.value)">
                        <option value="Pending" ${item.outcome === 'Pending' ? 'selected' : ''}>Pending</option>
                        <option value="Accepted" ${item.outcome === 'Accepted' ? 'selected' : ''}>Accepted</option>
                        <option value="Rejected" ${item.outcome === 'Rejected' ? 'selected' : ''}>Rejected</option>
                    </select>
                </td>
            `;
            tableBody.appendChild(rowElement);
        });
    }

    function modifyRowContact(id, textInput) {
        const targetRecord = masterDataMatrix.find(record => record.id === id);
        if (targetRecord) {
            targetRecord.contact = textInput;
            commitStateToStorage();
        }
    }

    function modifyRowDate(id, dateInput) {
        const targetRecord = masterDataMatrix.find(record => record.id === id);
        if (targetRecord) {
            targetRecord.date = dateInput;
            commitStateToStorage();
        }
    }

    function modifyRowStatus(id, selectedValue) {
        const targetRecord = masterDataMatrix.find(record => record.id === id);
        if (targetRecord) {
            targetRecord.status = selectedValue;
            commitStateToStorage();
            renderDatabaseGrid(masterDataMatrix); 
        }
    }

    function modifyRowOutcome(id, selectedValue) {
        const targetRecord = masterDataMatrix.find(record => record.id === id);
        if (targetRecord) {
            targetRecord.outcome = selectedValue;
            commitStateToStorage();
        }
    }

    if (influencerForm) {
        influencerForm.addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Generate standard YYYY-MM-DD format based on local execution date context
            const localTimestamp = new Date();
            const offsetDate = new Date(localTimestamp.getTime() - (localTimestamp.getTimezoneOffset() * 60000));
            const formattedCurrentDate = offsetDate.toISOString().split('T')[0];
            
            const generatedRecord = {
                id: Date.now(), 
                name: document.getElementById('infName').value,
                link: document.getElementById('infLink').value,
                sourcer: document.getElementById('sourcerName').value,
                contact: document.getElementById('infContact').value,
                status: document.getElementById('initialStatus').value,
                date: formattedCurrentDate,
                outcome: "Pending"
            };

            masterDataMatrix.unshift(generatedRecord); 
            commitStateToStorage();
            renderDatabaseGrid(masterDataMatrix);
            
            document.getElementById('infName').value = '';
            document.getElementById('infLink').value = '';
            document.getElementById('infContact').value = '';
        });
    }

    function escapeDataStrings(rawString) {
        if (!rawString) return "";
        return String(rawString).replace(/&/g, "&amp;")
                                .replace(/</g, "&lt;")
                                .replace(/>/g, "&gt;")
                                .replace(/"/g, "&quot;")
                                .replace(/'/g, "&#039;");
    }

    renderDatabaseGrid(masterDataMatrix);
</script>

</body>
</html>
